<!DOCTYPE html>
<html lang="en">
<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive page -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Browser title -->
<title>JavaScript Examples Menu</title>

<style>

/* Whole page */
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f6f9;
}

/* Header */
header{
    background:#0077cc;
    color:white;
    text-align:center;
    padding:25px;
}

/* Main menu box */
.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Title */
h1{
    margin:0;
}

/* Menu links */
a{
    display:block;
    text-decoration:none;
    background:#e8f5e9;
    color:#333;
    padding:15px;
    margin:12px 0;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

/* Hover effect */
a:hover{
    background:#c8e6c9;
    transform:translateX(5px);
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    color:gray;
}

</style>
</head>

<body>

<!-- Header -->
<header>
    <h1>JavaScript Control Statements</h1>
    <p>Main Menu</p>
</header>

<!-- Menu -->
<div class="container">

    <!-- Link to If Else page -->
    <a href="if else.html">1. JavaScript If Else</a>

    <!-- Link to For Loop page -->
    <a href="for loop.html">2. JavaScript For Loop</a>

    <!-- Link to While page -->
    <a href="while.html">3. JavaScript While Loop</a>

    <!-- Link to Do While page -->
    <a href="do while.html">4. JavaScript Do While Loop</a>

    <!-- Link to Break page -->
    <a href="break.html">5. JavaScript Break</a>

    <!-- Link to Continue page -->
    <a href="continue.html">6. JavaScript Continue</a>

</div>

<!-- Footer -->
<footer>
    Created for Web Technologies Subject
</footer>

</body>
</html>
